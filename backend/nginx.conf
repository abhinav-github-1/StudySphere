events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Dynamic log format to keep tabs on reverse proxy routes
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Enable Gzip compression to make responses snappy
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Tomcat API Upstream
    upstream tomcat_api {
        server 127.0.0.1:8085;
    }

    # Netty Socket.IO Upstream
    upstream netty_sockets {
        server 127.0.0.1:9092;
    }

    server {
        # PORT placeholder — will be replaced dynamically on startup with Render's PORT env var
        listen 80;
        server_name localhost;

        # 1. Socket.IO Polling & WebSocket Traffic
        location /socket.io/ {
            proxy_pass http://netty_sockets;
            
            # WebSocket specific headers for handshake upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Core timeouts for persistent connections
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # 2. Spring Boot REST Endpoints (Tomcat)
        location / {
            proxy_pass http://tomcat_api;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}
